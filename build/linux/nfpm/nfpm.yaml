# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json

# Feel free to remove those if you don't want/need to use them.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`

name: "sentinel"
arch: ${GOARCH}
platform: "linux"
version: ${APP_VERSION}
section: "default"
priority: "extra"
maintainer: "Remake Code <258896796+afk-rightnow@users.noreply.github.com>"
description: "An Achievement Watcher for Linux"
vendor: "Remake Code"
homepage: "https://github.com/RemakeCode/sentinel"
license: "MIT"
release: "1"
version_schema: semver


contents:
  - src: "./bin/sentinel"
    dst: "/usr/local/bin/sentinel"
  - src: "./build/appicon.png"
    dst: "/usr/share/icons/hicolor/128x128/apps/sentinel.png"
  - src: "./build/linux/sentinel.desktop"
    dst: "/usr/share/applications/sentinel.desktop"

# Default dependencies for Debian 12/Ubuntu 22.04+
depends:
  - libgtk-3-0
  - libwebkit2gtk-4.1-0
  - libnotify-bin

# Distribution-specific overrides for different package formats
overrides:
  # RPM packages for RHEL/CentOS/AlmaLinux/Rocky Linux
  rpm:
    depends:
      - gtk3
      - webkit2gtk-4.1
      - libnotify

  # Arch Linux packages
  archlinux:
    depends:
      - gtk3
      - webkit2gtk-4.1
      - libnotify


archlinux:
  packager: "Remake Code"

rpm:
  packager: "Remake Code"

# scripts section to ensure desktop database is updated after install
scripts:
  postinstall: "./build/linux/nfpm/scripts/postinstall.sh"
  # You can also add preremove, postremove if needed
  # preremove: "./build/linux/nfpm/scripts/preremove.sh"
  # postremove: "./build/linux/nfpm/scripts/postremove.sh"

