version: '3'

includes:
  common: ../Taskfile.yml

vars:
  # Signing configuration - edit these values for your project
  # PGP_KEY: "path/to/signing-key.asc"
  # SIGN_ROLE: "builder"  # Options: origin, maint, archive, builder
  #
  # Password is stored securely in system keychain. Run: wails3 setup signing

  # Docker image for cross-compilation (used when building on non-Linux or no CC available)

  CROSS_IMAGE: wails-cross
  MODULE: { sh: "go list -m" }

tasks:
  build:
    summary: Builds the application for Linux
    cmds:
      # Linux requires CGO - use Docker when:
      # 1. Cross-compiling from non-Linux, OR
      # 2. No C compiler is available, OR
      # 3. Target architecture differs from host architecture (cross-arch compilation)
      - task: '{{if and (eq OS "linux") (eq .HAS_CC "true") (eq .TARGET_ARCH ARCH)}}build:native{{else}}build:docker{{end}}'
        vars:
          ARCH: '{{.ARCH}}'
          DEV: '{{.DEV}}'
          OUTPUT: '{{.OUTPUT}}'
          EXTRA_TAGS: '{{.EXTRA_TAGS}}'
          OBFUSCATED: '{{.OBFUSCATED}}'
          GARBLE_ARGS: '{{.GARBLE_ARGS}}'
    vars:
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      # Determine target architecture (defaults to host ARCH if not specified)
      TARGET_ARCH: '{{.ARCH | default ARCH}}'
      # Check if a C compiler is available (gcc or clang)
      HAS_CC:
        sh: '(command -v gcc >/dev/null 2>&1 || command -v clang >/dev/null 2>&1) && echo "true" || echo "false"'

  decky:backend:
    summary: Builds the headless Decky backend for Linux
    deps:
      - task: common:go:mod:tidy
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build {{.BUILD_FLAGS}} -o {{.OUTPUT}} ./cmd/decky
    vars:
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}-decky'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      BUILD_FLAGS: '-tags decky -trimpath -buildvcs=false -ldflags="-w -s -X {{.MODULE}}/backend.Version={{.APP_VERSION}}"'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      VERSION: "{{.APP_VERSION}}"

  build:native:
    summary: Builds the application natively on Linux
    internal: true
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
      - task: generate:dotdesktop
    preconditions:
      - sh: '{{if eq .OBFUSCATED "true"}}command -v garble >/dev/null 2>&1{{else}}true{{end}}'
        msg: "garble is required for obfuscated builds. Install it with: go install mvdan.cc/garble@v0.16.0 (requires Go 1.24+). See https://github.com/burrowers/garble/releases for version/toolchain compatibility."
    cmds:
      - '{{if eq .OBFUSCATED "true"}}garble {{.GARBLE_ARGS}} build{{else}}go build{{end}} {{.BUILD_FLAGS}} -o {{.OUTPUT}}'
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if or .EXTRA_TAGS (eq .OBFUSCATED "true")}}-tags {{if eq .OBFUSCATED "true"}}wails_obfuscated{{if .EXTRA_TAGS}},{{end}}{{end}}{{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if eq .OBFUSCATED "true"}},wails_obfuscated{{end}}{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s -X {{.MODULE}}/backend.Version={{.APP_VERSION}}"{{end}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      EXTRA_TAGS: '{{.EXTRA_TAGS}}'
    env:
      GOOS: linux
      CGO_ENABLED: 1
      GOARCH: '{{.ARCH | default ARCH}}'
      VERSION: "{{.APP_VERSION}}"

  build:docker:
    summary: Builds for Linux using Docker (for non-Linux hosts or when no C compiler available)
    internal: true
    deps:
      - task: common:build:frontend
        vars:
          OBFUSCATED:
            ref: .OBFUSCATED
      - task: common:generate:icons
      - task: generate:dotdesktop
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "Docker is required for cross-compilation to Linux. Please install Docker."
      - sh: docker image inspect {{.CROSS_IMAGE}} > /dev/null 2>&1
        msg: |
          Docker image '{{.CROSS_IMAGE}}' not found.
          Build it first: wails3 task setup:docker
    cmds:
      - docker run --rm -v "{{.ROOT_DIR}}:/app" {{.DOCKER_MOUNTS}} -e APP_NAME="{{.APP_NAME}}" -e APP_VERSION="{{.APP_VERSION}}" {{if .EXTRA_TAGS}}-e EXTRA_TAGS="{{.EXTRA_TAGS}}"{{end}} {{if eq .OBFUSCATED "true"}}-e OBFUSCATED=true{{end}} {{if .GARBLE_ARGS}}-e GARBLE_ARGS="{{.GARBLE_ARGS}}"{{end}} "{{.CROSS_IMAGE}}" linux {{.DOCKER_ARCH}}
      - cmd: docker run --rm -v "{{.ROOT_DIR}}:/app" alpine chown -R $(id -u):$(id -g) /app/bin
        platforms: [linux, darwin]
      - mkdir -p {{.BIN_DIR}}
      - mv "bin/{{.APP_NAME}}-linux-{{.DOCKER_ARCH}}" "{{.OUTPUT}}"
    vars:
      DOCKER_ARCH: '{{.ARCH | default "amd64"}}'
      DEFAULT_OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}'
      OUTPUT: '{{ .OUTPUT | default .DEFAULT_OUTPUT }}'
      # Generate Docker volume mounts: Go module cache + go.mod replace directives
      # Uses wails3 tool docker-mounts for cross-platform compatibility (Windows/Linux/macOS)
      DOCKER_MOUNTS:
        sh: 'wails3 tool docker-mounts'

  package:
    summary: Packages the application for Linux
    deps:
      - task: build
    cmds:
      - task: create:deb
      - task: create:rpm
      - task: create:aur
      # Disabled until the generated AppImage crash is resolved.
      # - task: create:appimage
      - task: cleanup:artifacts

  create:appimage:
    summary: Creates an AppImage
    dir: build/linux/appimage
    deps:
      - task: build
      - task: generate:dotdesktop
        vars:
          APP_NAME: '{{.APP_NAME}}'
    cmds:
      - cp "{{.APP_BINARY}}" "{{.APP_NAME}}"
      - cp ../../appicon.png "{{.APP_NAME}}.png"
      - touch .appimage-build-marker
      - wails3 generate appimage -binary "{{.APP_NAME}}" -icon {{.ICON}} -desktopfile {{.DESKTOP_FILE}} -outputdir {{.OUTPUT_DIR}} -builddir {{.ROOT_DIR}}/build/linux/appimage/build
      - |
        if [ -n "${APP_VERSION}" ]; then
          find {{.OUTPUT_DIR}} -maxdepth 1 -type f -name '{{.APP_NAME}}*.AppImage' -newer .appimage-build-marker | while IFS= read -r artifact; do
            case "$artifact" in
              *"${APP_VERSION}"*.AppImage) continue ;;
            esac
            dir=$(dirname "$artifact")
            file=$(basename "$artifact")
            mv "$artifact" "$dir/${file%.AppImage}-${APP_VERSION}.AppImage"
          done
        fi
      - rm -f .appimage-build-marker
    vars:
      APP_NAME: '{{.APP_NAME}}'
      APP_BINARY: '../../../bin/{{.APP_NAME}}'
      ICON: '{{.APP_NAME}}.png'
      DESKTOP_FILE: '../{{.APP_NAME}}.desktop'
      OUTPUT_DIR: '../../../bin'

  create:deb:
    summary: Creates a deb package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:deb

  create:rpm:
    summary: Creates a rpm package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:rpm

  create:aur:
    summary: Creates a arch linux packager package
    deps:
      - task: build
    cmds:
      - task: generate:dotdesktop
      - task: generate:aur

  generate:deb:
    summary: Creates a deb package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format deb -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin

  generate:rpm:
    summary: Creates a rpm package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format rpm -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin

  generate:aur:
    summary: Creates a arch linux packager package
    cmds:
      - wails3 tool package -name "{{.APP_NAME}}" -format archlinux -config ./build/linux/nfpm/nfpm.yaml -out {{.ROOT_DIR}}/bin

  generate:dotdesktop:
    summary: Generates a `.desktop` file
    dir: build
    cmds:
      - mkdir -p {{.ROOT_DIR}}/build/linux/appimage
      - wails3 generate .desktop -name "{{.NAME}}" -exec "{{.EXEC}}" -icon "{{.ICON}}" -outputfile "{{.OUTPUTFILE}}" -categories "{{.CATEGORIES}}" -comment "{{.COMMENT}}" -keywords "{{.KEYWORDS}}"
    vars:
      NAME: 'Sentinel'
      EXEC: '{{.APP_NAME}}'
      ICON: '{{.APP_NAME}}'
      CATEGORIES: 'Game;'
      OUTPUTFILE: '{{.ROOT_DIR}}/build/linux/{{.APP_NAME}}.desktop'
      COMMENT: 'An Achievement Watcher for Linux'
      KEYWORDS: 'steam, achievements, watcher, trophy'

  run:
    cmds:
      - '{{.BIN_DIR}}/{{.APP_NAME}}'


  decky:install:deps:
    summary: Install frontend dep for decky
    dir: ./decky-plugin
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    cmds:
      - |
        if [ "$CI" = "true" ]; then
          rm -rf node_modules
          npm ci
        else
          npm install
        fi


  decky:dev:
    summary: Build and watch decky
    dir: decky-plugin
    sources:
      - package.json
      - package-lock.json
    generates:
      - dist
    cmds:
      - npm run dev

  decky:frontend:
    summary: Build Decky Frontend
    dir: decky-plugin
    sources:
      - package.json
      - package-lock.json
    generates:
      - dist
    cmds:
       - npm run build

  decky:package:
    summary: Bundles the Decky plugin (dist + binary + manifest) and zips it for distribution
    dir: decky-plugin
    deps:
      - task: decky:frontend
      - task: decky:backend
    cmds:
      - mkdir -p out/bin
      - mkdir -p out/dist/
      - cp -r ./dist ./out/
      - cp ../bin/{{.APP_NAME}}-decky out/bin/{{.APP_NAME}}-decky
      - cp ./plugin.json ./package.json ./main.py ./out/
      - |
        if [ -n "${APP_VERSION}" ]; then
          jq --arg v "$APP_VERSION" '.version = $v' out/package.json > out/package.json.tmp \
            && mv out/package.json.tmp out/package.json
        fi
      - chmod +x out/bin/{{.APP_NAME}}-decky
      - mkdir -p {{.ROOT_DIR}}/bin
      - cd out && zip -r {{.ROOT_DIR}}/bin/{{.APP_NAME}}-decky-plugin.zip .

   # add to visudo
   # deck ALL=(root) NOPASSWD: /bin/chown -R deck /home/deck/homebrew/plugins/sentinel, /bin/mkdir -p /home/deck/homebrew/plugins/sentinel, /bin/mv /home/deck/homebrew/plugins/sentinel/bin/sentinel /home/deck/homebrew/plugins/sentinel/bin/sentinel.old, /bin/cp -R * /home/deck/homebrew/plugins/sentinel, /bin/rm -f /home/deck/homebrew/plugins/sentinel/bin/sentinel.old, /bin/touch /home/deck/homebrew/plugins/sentinel/main.py

  decky:deploy:local:
    summary: Builds and deploys the plugin to Decky Loader via SSH
    dir: decky-plugin
    sources:
      - "./dist/index.js"
      - "../bin/"
    vars:
      DECK_DIR: "~/homebrew/plugins"
      PLUGINNAME: "sentinel"
    cmds:
      - pkill -f ~/homebrew/plugins/sentinel/bin/sentinel-decky || true
      - sleep 1
      - mkdir -p out/bin
      - mkdir -p out/dist/
      - cp -r ./dist ./out/
      - task: decky:backend
      - cp ../bin/{{.APP_NAME}}-decky out/bin/{{.APP_NAME}}-decky
      - cp ./plugin.json ./package.json ./main.py ./out/
      - chmod +x out/bin/{{.APP_NAME}}-decky
      - sudo mkdir -p {{.DECK_DIR}}/{{.PLUGINNAME}}
      - sudo chown -R $(whoami) {{.DECK_DIR}}/{{.PLUGINNAME}}
      - sudo cp -R out/* {{.DECK_DIR}}/{{.PLUGINNAME}}
     # - sudo touch {{.DECK_DIR}}/{{.PLUGINNAME}}/main.py
     # - sudo touch {{.DECK_DIR}}/{{.PLUGINNAME}}/dist/index.js

  sign:deb:
    summary: Signs the DEB package
    desc: |
      Signs the .deb package with a PGP key.
      Configure PGP_KEY in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:deb
    cmds:
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}*.deb" --pgp-key {{.PGP_KEY}} {{if .SIGN_ROLE}}--role {{.SIGN_ROLE}}{{end}}
    preconditions:
      - sh: '[ -n "{{.PGP_KEY}}" ]'
        msg: "PGP_KEY is required. Set it in the vars section at the top of build/linux/Taskfile.yml"

  sign:rpm:
    summary: Signs the RPM package
    desc: |
      Signs the .rpm package with a PGP key.
      Configure PGP_KEY in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    deps:
      - task: create:rpm
    cmds:
      - wails3 tool sign --input "{{.BIN_DIR}}/{{.APP_NAME}}*.rpm" --pgp-key {{.PGP_KEY}}
    preconditions:
      - sh: '[ -n "{{.PGP_KEY}}" ]'
        msg: "PGP_KEY is required. Set it in the vars section at the top of build/linux/Taskfile.yml"

  sign:packages:
    summary: Signs all Linux packages (DEB and RPM)
    desc: |
      Signs both .deb and .rpm packages with a PGP key.
      Configure PGP_KEY in the vars section at the top of this file.
      Password is retrieved from system keychain (run: wails3 setup signing)
    cmds:
      - task: sign:deb
      - task: sign:rpm
    preconditions:
      - sh: '[ -n "{{.PGP_KEY}}" ]'
        msg: "PGP_KEY is required. Set it in the vars section at the top of build/linux/Taskfile.yml"

  cleanup:artifacts:
    summary: Cleans up temporary build artifacts
    dir: build/linux/appimage
    cmds:
      # Remove downloaded linuxdeploy AppImage files
      - rm -f linuxdeploy-*-AppImage
      # Remove copied binary and icon files
      - rm -f "{{.APP_NAME}}"
      - rm -f "{{.APP_NAME}}.png"
    vars:
      APP_NAME: '{{.APP_NAME}}'
