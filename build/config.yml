# This file contains the configuration for this project.
# When you update `info` or `fileAssociations`, run `wails3 task common:update:build-assets` to update the assets.
# Note that this will overwrite any changes you have made to the assets.
version: '3'

# This information is used to generate the build assets.
info:
  companyName: "" # The name of the company
  productName: "Sentinel" # The name of the application
  productIdentifier: "com.sentinel.app" # The unique product identifier
  description: "Sentinel" # The application description
  copyright: "(c) 2026" # Copyright text
  comments: "Sentinel " # Comments
  version: "0.1.0" # The application version

# Dev mode configuration
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js" # Watch for changes to JS/TS files included using the //wails:include directive.
      - "*.ts" # The frontend directory will be excluded entirely by the setting above.
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: secondary
    - cmd: wails3 task run
      type: primary

# File Associations
fileAssociations:

# Other data
other:
  - name: Sentinel Data
